name: CI

on:
  push:
  pull_request:

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: 1.26.3
      - name: Test
        working-directory: bridge
        run: go test ./...
      - name: Vet
        working-directory: bridge
        run: go vet ./...
      - name: Build bundled bridge
        shell: pwsh
        run: ./scripts/build.ps1
      - name: Check bundled bridge is current
        run: git diff --exit-code -- plugins/delegate-hub/bin/delegate-hub.exe
